<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ghibli Meadow Chess 3D</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #bae6fd;
            font-family: 'Georgia', serif; 
        }
        canvas { display: block; width: 100vw !important; height: 100vh !important; }
    </style>
</head>
<body>

    <div class="absolute top-4 left-4 right-4 md:right-auto z-10 bg-white/95 backdrop-blur-md p-5 rounded-2xl shadow-xl border border-emerald-100 max-w-sm mx-auto md:mx-0">
        <h1 class="text-2xl font-bold text-emerald-800 tracking-wide">🌳 Ghibli Chess</h1>
        <p class="text-xs text-emerald-600 font-sans mb-4">Live GitHub Deployment</p>
        
        <div class="space-y-4 border-t border-gray-100 pt-3">
            <div>
                <span class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Active Cast Blueprint</span>
                <div class="grid grid-cols-2 gap-2 text-xs text-gray-700 bg-emerald-50/50 p-2 rounded-lg">
                    <div>👑 <b>King:</b> Totoro</div>
                    <div>👑 <b>Queen:</b> Mononoke</div>
                    <div>🏰 <b>Rook:</b> Castle</div>
                    <div>🦄 <b>Knight:</b> Yakul</div>
                    <div>🧙‍♂️ <b>Bishop:</b> No-Face</div>
                    <div>🌱 <b>Pawn:</b> Sprite</div>
                </div>
            </div>
            <p class="text-[10px] text-gray-400 font-sans">💡 Drag to rotate view. Pinch to zoom.</p>
        </div>
        
        <div id="terminal-debug" class="mt-3 text-[9px] font-mono text-red-600 bg-red-50 p-2 rounded hidden max-h-24 overflow-y-auto"></div>
    </div>

    <div id="canvas-container" class="absolute top-0 left-0 w-full h-full z-0"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // Emergency mobile layout debugger
        window.onerror = function(msg, url, line) {
            const el = document.getElementById('terminal-debug');
            if(el) {
                el.classList.remove('hidden');
                el.innerHTML += `Error: ${msg} on line ${line}<br>`;
            }
        };

        // --- 1. ENVIRONMENT ENGINE CONFIGURATION ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        scene.background = new THREE.Color(0xbae6fd);
        scene.fog = new THREE.FogExp2(0xbae6fd, 0.015);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 11, 13);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.1;
        container.appendChild(renderer.domElement);

        // Fixed Constructor Call matching Module standards
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.05;

        // --- 2. LIGHTING ENGINE ---
        const ambientLight = new THREE.AmbientLight(0xdbeafe, 1.0);
        scene.add(ambientLight);

        const daylight = new THREE.DirectionalLight(0xfffbeb, 1.5);
        daylight.position.set(15, 25, 10);
        daylight.castShadow = true;
        daylight.shadow.mapSize.width = 512;
        daylight.shadow.mapSize.height = 512;
        scene.add(daylight);

        // --- 3. FLOATING GREEN MEADOW ISLAND ---
        const islandGeo = new THREE.CylinderGeometry(18, 20, 4, 32);
        const islandMat = new THREE.MeshStandardMaterial({ color: 0x4ade80, roughness: 0.9 });
        const island = new THREE.Mesh(islandGeo, islandMat);
        island.position.y = -2.1;
        island.receiveShadow = true;
        scene.add(island);

        // --- 4. ENGINE CHESSBOARD ---
        const boardGroup = new THREE.Group();
        const sqSize = 1.25;
        const darkMat = new THREE.MeshStandardMaterial({ color: 0x14532d, roughness: 0.7 });
        const lightMat = new THREE.MeshStandardMaterial({ color: 0xfef08a, roughness: 0.5 });

        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                const sqGeo = new THREE.BoxGeometry(sqSize, 0.15, sqSize);
                const tile = new THREE.Mesh(sqGeo, (r + c) % 2 === 1 ? darkMat : lightMat);
                tile.position.set((c - 3.5) * sqSize, 0, (r - 3.5) * sqSize);
                tile.receiveShadow = true;
                boardGroup.add(tile);
            }
        }
        scene.add(boardGroup);

        // --- 5. GHIBLI PIECE MANAGEMENT INTERFACE ---
        const GHIBLI_ASSET_MANIFEST = {
            'pawn':   { url: 'assets/models/soot_sprite.glb', scale: 0.35, yOffset: 0.1 },
            'king':   { url: 'assets/models/totoro.glb',       scale: 0.55, yOffset: 0.1 },
            'queen':  { url: 'assets/models/mononoke.glb',     scale: 0.50, yOffset: 0.1 },
            'rook':   { url: 'assets/models/howl_castle.glb',  scale: 0.45, yOffset: 0.1 },
            'knight': { url: 'assets/models/yakul.glb',        scale: 0.50, yOffset: 0.1 },
            'bishop': { url: 'assets/models/noface.glb',       scale: 0.48, yOffset: 0.1 }
        };

        const pieceGroup = new THREE.Group();
        scene.add(pieceGroup);

        const initialLayout = [
            ['rook', 'knight', 'bishop', 'queen', 'king', 'bishop', 'knight', 'rook'],
            ['pawn', 'pawn', 'pawn', 'pawn', 'pawn', 'pawn', 'pawn', 'pawn'],
            [], [], [], [],
            ['pawn', 'pawn', 'pawn', 'pawn', 'pawn', 'pawn', 'pawn', 'pawn'],
            ['rook', 'knight', 'bishop', 'queen', 'king', 'bishop', 'knight', 'rook']
        ];

        // Instantiate loader via the newly imported module definition
        const gltfLoader = new GLTFLoader();

        function generateProceduralFallback(type, color) {
            const containerMesh = new THREE.Group();
            let geo = type === 'pawn' ? new THREE.SphereGeometry(0.22, 12, 12) : new THREE.CylinderGeometry(0.2, 0.3, 0.7, 12);
            let mat = new THREE.MeshStandardMaterial({
                color: color === 'white' ? 0xffffff : 0x27272a,
                roughness: 0.4
            });
            const baseMesh = new THREE.Mesh(geo, mat);
            baseMesh.position.y = 0.35;
            baseMesh.castShadow = true;
            containerMesh.add(baseMesh);
            return containerMesh;
        }

        function populateSimulation() {
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const type = initialLayout[r]?.[c];
                    if (!type) continue;
                    
                    const side = (r < 2) ? 'black' : 'white';
                    const posX = (c - 3.5) * sqSize;
                    const posZ = (r - 3.5) * sqSize;

                    const fallbackNode = generateProceduralFallback(type, side);
                    fallbackNode.position.set(posX, 0, posZ);
                    pieceGroup.add(fallbackNode);

                    const assetMeta = GHIBLI_ASSET_MANIFEST[type];
                    gltfLoader.load(assetMeta.url, (gltf) => {
                        const importedModel = gltf.scene;
                        importedModel.scale.setScalar(assetMeta.scale);
                        importedModel.position.set(posX,
