<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ghibli Meadow Chess 3D</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #bae6fd; font-family: 'Georgia', serif; }
        canvas { display: block; width: 100vw !important; height: 100vh !important; }
    </style>
</head>
<body>

    <div class="absolute top-4 left-4 right-4 md:right-auto z-10 bg-white/95 backdrop-blur-md p-5 rounded-2xl shadow-xl border border-emerald-100 max-w-sm mx-auto md:mx-0">
        <h1 class="text-2xl font-bold text-emerald-800 tracking-wide">🌳 Ghibli Chess</h1>
        <div id="turn-indicator" class="inline-block mt-1 text-xs font-bold px-3 py-1 bg-emerald-100 text-emerald-800 rounded-full">White's Turn</div>
        <div class="space-y-3 border-t border-gray-100 pt-3 mt-3">
            <div class="grid grid-cols-2 gap-2 text-xs text-gray-700 bg-emerald-50/50 p-2 rounded-lg">
                <div>👑 <b>King:</b> Totoro</div>
                <div>👑 <b>Queen:</b> Mononoke</div>
                <div>🏰 <b>Rook:</b> Castle</div>
                <div>🦄 <b>Knight:</b> Yakul</div>
                <div>🧙‍♂️ <b>Bishop:</b> No-Face</div>
                <div>🌱 <b>Pawn:</b> Sprite</div>
            </div>
            <p class="text-[10px] text-gray-500 font-sans">👉 <b>Play:</b> Tap your piece to select it, then tap an empty square to move it!</p>
        </div>
    </div>

    <div id="canvas-container" class="absolute top-0 left-0 w-full h-full z-0"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- 1. SETUP CORE SCENE BUILDERS ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xbae6fd);
        scene.fog = new THREE.FogExp2(0xbae6fd, 0.015);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 10, 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.05;

        // --- 2. LIGHTING ENGINE ---
        scene.add(new THREE.AmbientLight(0xdbeafe, 1.1));
        const daylight = new THREE.DirectionalLight(0xfffbeb, 1.4);
        daylight.position.set(10, 20, 10);
        daylight.castShadow = true;
        scene.add(daylight);

        // --- 3. ENVIRONMENT ISLE ---
        const island = new THREE.Mesh(new THREE.CylinderGeometry(16, 18, 3, 32), new THREE.MeshStandardMaterial({ color: 0x4ade80, roughness: 0.9 }));
        island.position.y = -1.6;
        island.receiveShadow = true;
        scene.add(island);

        // --- 4. BOARD INTERACTIVE REGISTRY ---
        const sqSize = 1.25;
        let activeTurn = 'white';
        let selectedPieceNode = null;

        const darkMat = new THREE.MeshStandardMaterial({ color: 0x14532d, roughness: 0.7 });
        const lightMat = new THREE.MeshStandardMaterial({ color: 0xfef08a, roughness: 0.5 });

        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                const tile = new THREE.Mesh(new THREE.BoxGeometry(sqSize, 0.15, sqSize), (r + c) % 2 === 1 ? darkMat : lightMat);
                tile.position.set((c - 3.5) * sqSize, 0, (r - 3.5) * sqSize);
                tile.userData = { row: r, col: c, isTile: true };
                tile.receiveShadow = true;
                scene.add(tile);
            }
        }

                // --- 5. GHIBLI PIECE MANAGEMENT INTERFACE ---
        const GHIBLI_ASSET_MANIFEST = {
            'pawn':   { url: 'assets/models/soot_sprite.glb', scale: 0.35, yOffset: 0.1 },
            'king':   { url: 'assets/models/totoro.glb',       scale: 0.55, yOffset: 0.1 },
            'queen':  { url: 'assets/models/mononoke.glb',     scale: 0.50, yOffset: 0.1 },
            'rook':   { url: 'assets/models/howl_castle.glb',  scale: 0.05, yOffset: 0.0 }, // Scaled down significantly
            'knight': { url: 'assets/models/yakul.glb',        scale: 0.50, yOffset: 0.1 },
            'bishop': { url: 'assets/models/noface.glb',       scale: 0.48, yOffset: 0.1 }
        };

        const initialLayout = [
            ['rook', 'knight', 'bishop', 'queen', 'king', 'bishop', 'knight', 'rook'],
            ['pawn', 'pawn', 'pawn', 'pawn', 'pawn', 'pawn', 'pawn', 'pawn'],
            [], [], [], [],
            ['pawn', 'pawn', 'pawn', 'pawn', 'pawn', 'pawn', 'pawn', 'pawn'],
            ['rook', 'knight', 'bishop', 'queen', 'king', 'bishop', 'knight', 'rook']
        ];

        const gltfLoader = new GLTFLoader();

        function createFallbackMesh(type, side) {
            const group = new THREE.Group();
            const geo = type === 'pawn' ? new THREE.SphereGeometry(0.22, 12, 12) : new THREE.CylinderGeometry(0.2, 0.28, 0.7, 12);
            const mat = new THREE.MeshStandardMaterial({ 
                color: side === 'white' ? 0xfbfbfb : 0x3f3f46, 
                roughness: 0.4 
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.y = 0.35;
            mesh.castShadow = true;
            group.add(mesh);
            return group;
        }

        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                const type = initialLayout[r]?.[c];
                if (!type) continue;
                const side = (r < 2) ? 'black' : 'white';
                
                // Create a container group to hold either fallback or real model seamlessly
                const pieceContainer = new THREE.Group();
                pieceContainer.position.set((c - 3.5) * sqSize, 0, (r - 3.5) * sqSize);
                pieceContainer.userData = { type, side, row: r, col: c, isPiece: true };
                
                // Attach visual fallback instantly
                const fallback = createFallbackMesh(type, side);
                pieceContainer.add(fallback);
                scene.add(pieceContainer);

                // Asynchronously stream your Ghibli .glb files from github paths
                const meta = GHIBLI_ASSET_MANIFEST[type];
                if (meta) {
                    gltfLoader.load(meta.url, (gltf) => {
                        const model = gltf.scene;
                        model.scale.setScalar(meta.scale);
                        model.position.set(0, meta.yOffset, 0);
                        if (side === 'black') model.rotation.y = Math.PI;

                        model.traverse(node => {
                            if (node.isMesh) {
                                node.castShadow = true;
                                node.receiveShadow = true;
                                // Darken texture coloring for black side pieces slightly
                                if (side === 'black' && node.material) {
                                    node.material = node.material.clone();
                                    node.material.color.multiplyScalar(0.5);
                                }
                            }
                        });
                        
                        pieceContainer.remove(fallback);
                        pieceContainer.add(model);
                    }, undefined, (err) => {
                        console.log(`Streaming ${meta.url} failed or delayed. Holding fallback token.`);
                    });
                }
            }
        }

        // --- 6. INTERACTION RAYCASTER ---
        const raycaster = new THREE.Raycaster();
        const pointer = new THREE.Vector2();

        function handleInteraction(event) {
            const clientX = event.touches ? event.touches[0].clientX : event.clientX;
            const clientY = event.touches ? event.touches[0].clientY : event.clientY;

            pointer.x = (clientX / window.innerWidth) * 2 - 1;
            pointer.y = -(clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(pointer, camera);
            const targets = raycaster.intersectObjects(scene.children, true);
            if (targets.length === 0) return;

            let match = null;
            for (let i = 0; i < targets.length; i++) {
                let curr = targets[i].object;
                while (curr.parent && curr !== scene) {
                    if (curr.userData.isPiece || curr.userData.isTile) {
                        match = curr;
                        break;
                    }
                    curr = curr.parent;
                }
                if (match) break;
            }

            if (!match) return;

            if (match.userData.isPiece) {
                if (match.userData.side === activeTurn) {
                    if (selectedPieceNode) selectedPieceNode.scale.set(1, 1, 1);
                    selectedPieceNode = match;
                    selectedPieceNode.scale.set(1.2, 1.2, 1.2);
                }
            } 
            else if (match.userData.isTile && selectedPieceNode) {
                selectedPieceNode.position.set(match.position.x, 0, match.position.z);
                selectedPieceNode.userData.row = match.userData.row;
                selectedPieceNode.userData.col = match.userData.col;
                selectedPieceNode.scale.set(1, 1, 1);

                activeTurn = (activeTurn === 'white') ? 'black' : 'white';
                document.getElementById('turn-indicator').innerText = `${activeTurn.charAt(0).toUpperCase() + activeTurn.slice(1)}'s Turn`;
                selectedPieceNode = null;
            }
        }

        window.addEventListener('click', handleInteraction);
        window.addEventListener('touchstart', handleInteraction, { passive: true });

        // --- 7. ANIMATION MATRIX ---
        function frame() {
            requestAnimationFrame(frame);
            controls.update();
            renderer.render(scene, camera);
        }
        frame();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
